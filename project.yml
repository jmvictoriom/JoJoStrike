name: JoJoStrike
options:
  bundleIdPrefix: com.jojostrike
  deploymentTarget:
    iOS: "26.0"
  minimumXcodeGenVersion: "2.30"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
targets:
  JoJoStrike:
    type: application
    platform: iOS
    sources:
      - path: JoJoStrike
        excludes:
          - "Resources/**"
          - "ML/PoseData/**"
    resources:
      - path: JoJoStrike/Resources/Assets.xcassets
      - path: JoJoStrike/Resources/Sounds
        optional: true
      - path: JoJoStrike/Resources/Animations
        optional: true
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSCameraUsageDescription: "JoJo Strike needs camera access to detect your poses and compare them with iconic JoJo poses."
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.jojostrike.app
        PRODUCT_NAME: "JoJo Strike"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
